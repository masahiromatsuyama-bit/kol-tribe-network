<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOL Tribe Network — ペット界隈</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
  font-family:'Helvetica Neue',Arial,sans-serif;background:#0f1117;color:#e0e0e0;}
#wrap{display:flex;width:100vw;height:100vh;}
#sidebar{width:280px;min-width:280px;background:#1a1d27;padding:16px 14px;
  overflow-y:auto;border-right:1px solid #2d3142;box-sizing:border-box;}
#sidebar h1{font-size:13px;font-weight:700;color:#fff;margin:0 0 2px;}
#sidebar p{font-size:10px;color:#888;margin:0 0 12px;}
.leg{display:flex;align-items:center;gap:7px;margin-bottom:4px;cursor:pointer;
  padding:4px 6px;border-radius:4px;transition:background .15s;}
.leg:hover,.leg.on{background:#2d3142;}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.lbl{font-size:11px;flex:1;line-height:1.3;}
.cnt{font-size:10px;color:#888;white-space:nowrap;}
.tribe-desc{font-size:9px;color:#666;padding:2px 0 4px 17px;line-height:1.4;display:none;}
.leg.on + .tribe-desc{display:block;}
#canvas{flex:1;position:relative;overflow:hidden;}
#canvas svg{position:absolute;top:0;left:0;}
#tip{position:absolute;background:rgba(15,17,23,.95);color:#eee;
  border:1px solid #444;border-radius:7px;padding:9px 13px;font-size:12px;
  line-height:1.6;pointer-events:none;max-width:260px;display:none;z-index:20;}
#tip a{color:#6ab4ff;text-decoration:none;}
#ctrl{position:absolute;bottom:18px;right:18px;display:flex;gap:7px;}
#ctrl button{background:#2d3142;color:#ddd;border:1px solid #444;
  padding:6px 13px;border-radius:5px;cursor:pointer;font-size:12px;}
#ctrl button:hover{background:#3d4252;}
#srch{position:absolute;top:16px;right:16px;background:#1a1d27;
  border:1px solid #444;border-radius:5px;padding:6px 11px;color:#ddd;
  font-size:12px;width:190px;outline:none;}
#srch:focus{border-color:#6ab4ff;}
.tribe-label{font-size:11px;font-weight:700;fill:#fff;pointer-events:none;
  text-shadow:0 1px 3px #000;}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <h1>KOL Tribe Network — ペット界隈</h1>
    <p>上位350件 / 除外アカウント非表示</p>
    <div id="legend"></div>
  </div>
  <div id="canvas">
    <input id="srch" type="text" placeholder="ハンドル名で検索...">
    <svg id="svg"></svg>
    <div id="tip"></div>
    <div id="ctrl">
      <button id="breset">リセット</button>
      <button id="bzin">＋</button>
      <button id="bzout">－</button>
    </div>
  </div>
</div>

const STATS = [{"tribe_id": 10, "tribe_ja": "猫日常・下僕物語", "color": "#607D8B", "count": 98}, {"tribe_id": 13, "tribe_ja": "大型犬・和犬・アウトドア", "color": "#A04000", "count": 50}, {"tribe_id": 12, "tribe_ja": "芸能人・クリエイターのペット推し", "color": "#C0392B", "count": 35}, {"tribe_id": 1, "tribe_ja": "チワワ濃縮コミュニティ", "color": "#E8A87C", "count": 30}, {"tribe_id": 2, "tribe_ja": "小型犬おしゃれ・アンバサダー", "color": "#E8763A", "count": 26}, {"tribe_id": 3, "tribe_ja": "多頭ファミリー観察", "color": "#F4A261", "count": 21}, {"tribe_id": 14, "tribe_ja": "エキゾチック・小動物・鳥・爬虫類", "color": "#27AE60", "count": 18}, {"tribe_id": 15, "tribe_ja": "ペットメディア・UGCまとめ", "color": "#8E44AD", "count": 15}, {"tribe_id": 9, "tribe_ja": "保護・譲渡・動物福祉", "color": "#2D6A4F", "count": 14}, {"tribe_id": 5, "tribe_ja": "ケア・健康・長寿・シニア犬", "color": "#8D99AE", "count": 11}, {"tribe_id": 4, "tribe_ja": "ペット同伴カフェ・旅・おでかけ", "color": "#2A9D8F", "count": 9}, {"tribe_id": 6, "tribe_ja": "専門家・獣医・防災・教育", "color": "#457B9D", "count": 9}, {"tribe_id": 8, "tribe_ja": "ブリーダー・犬舎・迎え入れ", "color": "#6D4C41", "count": 7}, {"tribe_id": 7, "tribe_ja": "ペットブランド・ショップ・EC", "color": "#E63946", "count": 6}, {"tribe_id": 11, "tribe_ja": "猫住まい・猫向け空間設計", "color": "#4A4E69", "count": 1}];
const N_TRIBES = 15;

window.addEventListener('load', function() {
  const canvasEl = document.getElementById('canvas');
  const W = canvasEl.clientWidth;
  const H = canvasEl.clientHeight;
  const svgEl = document.getElementById('svg');
  svgEl.setAttribute('width', W);
  svgEl.setAttribute('height', H);
  const svg = d3.select('#svg');
  const g = svg.append('g');

  // Cluster centers arranged in circle
  const R = Math.min(W, H) * 0.35;
  const tribeIds = STATS.map(s => s.tribe_id);
  const clusterCenter = {};
  tribeIds.forEach((tid, i) => {
    const ang = (2 * Math.PI * i / tribeIds.length) - Math.PI / 2;
    clusterCenter[tid] = { x: W/2 + R * Math.cos(ang), y: H/2 + R * Math.sin(ang) };
  });

  const tribeColor = {};
  STATS.forEach(s => { tribeColor[s.tribe_id] = s.color; });

  function nodeColor(d) { return tribeColor[d.tribe_id] || '#aaa'; }
  function nodeR(d) {
    const f = d.followers_num;
    if (f > 1000000) return 14;
    if (f > 500000)  return 11;
    if (f > 200000)  return 9;
    if (f > 100000)  return 7;
    if (f > 50000)   return 5;
    return 4;
  }

  // Initial positions near cluster centers
  NODES.forEach(d => {
    const c = clusterCenter[d.tribe_id];
    if (c) {
      d.x = c.x + (Math.random() - 0.5) * 120;
      d.y = c.y + (Math.random() - 0.5) * 120;
    } else {
      d.x = W/2 + (Math.random() - 0.5) * 300;
      d.y = H/2 + (Math.random() - 0.5) * 300;
    }
  });

  function forceCluster(alpha) {
    const s = 0.25;
    NODES.forEach(d => {
      const c = clusterCenter[d.tribe_id];
      if (!c) return;
      d.vx += (c.x - d.x) * s * alpha;
      d.vy += (c.y - d.y) * s * alpha;
    });
  }

  const sim = d3.forceSimulation(NODES)
    .force('link', d3.forceLink(LINKS).id(d => d.id)
      .distance(d => d.same_tribe ? 35 : 80).strength(d => d.same_tribe ? 0.8 : 0.3))
    .force('charge', d3.forceManyBody().strength(-60))
    .force('collide', d3.forceCollide().radius(d => nodeR(d) + 3))
    .force('cluster', forceCluster);

  // Edges
  const link = g.append('g').attr('stroke-opacity', 0.35)
    .selectAll('line').data(LINKS).join('line')
    .attr('stroke', d => nodeColor(NODES[typeof d.source === 'object' ? d.source.index : d.source]))
    .attr('stroke-width', d => d.same_tribe ? 1.2 : 0.6);

  // Tribe labels at cluster centers
  const labelG = g.append('g');
  STATS.forEach(s => {
    const c = clusterCenter[s.tribe_id];
    if (!c) return;
    labelG.append('text')
      .attr('x', c.x).attr('y', c.y - 45)
      .attr('text-anchor', 'middle')
      .attr('class', 'tribe-label')
      .attr('fill', s.color)
      .attr('opacity', 0.85)
      .text(s.tribe_ja);
  });

  // Nodes
  const nodeG = g.append('g').selectAll('g').data(NODES).join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  nodeG.append('circle')
    .attr('r', nodeR)
    .attr('fill', nodeColor)
    .attr('stroke', d => d3.color(nodeColor(d))?.darker(0.7) ?? '#666')
    .attr('stroke-width', 1.2)
    .style('cursor', 'pointer');

  nodeG.append('text')
    .attr('dy', d => nodeR(d) + 9)
    .attr('text-anchor', 'middle')
    .attr('font-size', 8)
    .attr('fill', '#ccc')
    .attr('pointer-events', 'none')
    .text(d => d.followers_num > 200000 ? '@'+d.handle : '');

  const tip = document.getElementById('tip');
  nodeG.on('mouseover', (e,d) => {
    tip.innerHTML =
      `<strong>@${d.handle}</strong><br>`+
      (d.name !== d.handle ? d.name+'<br>' : '')+
      `<span style="color:#aaa">フォロワー:${d.followers} | ${d.tier}</span><br>`+
      `<span style="color:${nodeColor(d)}"># ${d.tribe_ja}</span><br>`+
      `<small style="color:#999">${d.bio}</small><br>`+
      `<a href="${d.url}" target="_blank">Instagram →</a>`;
    tip.style.display = 'block';
    tip.style.left = (e.clientX - canvasEl.getBoundingClientRect().left + 12)+'px';
    tip.style.top  = (e.clientY - canvasEl.getBoundingClientRect().top  - 10)+'px';
  }).on('mousemove', e => {
    tip.style.left = (e.clientX - canvasEl.getBoundingClientRect().left + 12)+'px';
    tip.style.top  = (e.clientY - canvasEl.getBoundingClientRect().top  - 10)+'px';
  }).on('mouseout', () => tip.style.display='none')
    .on('click', (_,d) => window.open(d.url,'_blank'));

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeG.attr('transform', d=>`translate(${d.x},${d.y})`);
  });

  // Zoom
  const zoom = d3.zoom().scaleExtent([0.05, 12])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Filter by tribe
  let active = null;
  function filterTribe(tribe_id, el) {
    if (active === tribe_id) {
      active = null;
      document.querySelectorAll('.leg').forEach(x => x.classList.remove('on'));
      nodeG.selectAll('circle').attr('opacity', 1);
      link.attr('opacity', 0.35);
    } else {
      active = tribe_id;
      document.querySelectorAll('.leg').forEach(x => x.classList.remove('on'));
      el.classList.add('on');
      nodeG.selectAll('circle').attr('opacity', d => d.tribe_id === tribe_id ? 1 : 0.05);
      link.attr('opacity', d => {
        const s = typeof d.source === 'object' ? d.source : NODES[d.source];
        const t = typeof d.target === 'object' ? d.target : NODES[d.target];
        return (s.tribe_id === tribe_id || t.tribe_id === tribe_id) ? 0.6 : 0.03;
      });
    }
  }

  // Legend
  const legEl = document.getElementById('legend');
  STATS.forEach(s => {
    const wrap = document.createElement('div');
    const div = document.createElement('div');
    div.className = 'leg';
    div.innerHTML =
      `<div class="dot" style="background:${s.color}"></div>`+
      `<span class="lbl">${s.tribe_ja}</span>`+
      `<span class="cnt">${s.count}件</span>`;
    div.addEventListener('click', () => filterTribe(s.tribe_id, div));
    wrap.appendChild(div);
    legEl.appendChild(wrap);
  });

  // Search
  document.getElementById('srch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    if (!q) { nodeG.selectAll('circle').attr('opacity',1).attr('r',nodeR); return; }
    nodeG.selectAll('circle')
      .attr('opacity', d => d.handle.includes(q)||(d.name||'').toLowerCase().includes(q) ? 1 : 0.04)
      .attr('r', d => d.handle.includes(q) ? nodeR(d)*2.5 : nodeR(d));
  });

  document.getElementById('breset').onclick = () =>
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  document.getElementById('bzin').onclick = () =>
    svg.transition().duration(250).call(zoom.scaleBy, 1.5);
  document.getElementById('bzout').onclick = () =>
    svg.transition().duration(250).call(zoom.scaleBy, 0.67);
});
</script>
</body>
</html>
